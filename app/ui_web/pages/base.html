<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} | Crypto Tax App</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <header>
      <div class="brand">
        <h1>Crypto Tax App</h1>
        <span>Binance Japan / 日本向け暗号資産損益計算補助</span>
      </div>
      <nav>
        <a href="/dashboard">ダッシュボード</a>
        <a href="/import">取込</a>
        <a href="/integrations">API連携</a>
        <a href="/transactions">取引一覧</a>
        <a href="/calc">計算結果</a>
        <a href="/analysis">分析</a>
        <a href="/review">要確認</a>
        <a href="/exports">エクスポート</a>
        <a href="/settings">設定</a>
        <a href="/docs">API Docs</a>
      </nav>
    </header>
    <main>
      <section class="hero">
        <h2>{{ title }}</h2>
        <p class="muted">{{ notice_tax }}</p>
        <p class="muted">{{ notice_review }}</p>
      </section>
      {% if message %}
      <div class="notice">{{ message }}</div>
      {% endif %}
      {% if error %}
      <div class="notice error">{{ error }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
